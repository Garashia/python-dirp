name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "pypi or testpypi"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CIBW_BUILD: "cp311-manylinux_x86_64"
      CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
      CIBW_BEFORE_ALL_LINUX: "curl -fsSL https://go.dev/dl/go1.22.12.linux-amd64.tar.gz -o /tmp/go.tar.gz && rm -rf /usr/local/go && tar -C /usr/local -xzf /tmp/go.tar.gz"
      CIBW_ENVIRONMENT_LINUX: "PATH=/usr/local/go/bin:$PATH CGO_ENABLED=1"
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Build distributions
        run: |
          rm -rf dist
          python -m pip install --upgrade pip
          python -m pip install build cibuildwheel
          python -m build --sdist
          python -m cibuildwheel --output-dir dist

      - name: Publish to TestPyPI
        if: ${{ github.event.inputs.repository == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.repository == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
